<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Produto - Beep</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .autocomplete-list {
            position: absolute;
            z-index: 999;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="sidebar bg-dark text-white p-3" style="width: 260px; min-height: 100vh;">
        <h4 class="text-center mb-4">Beep Estoque</h4>

        <h6 class="text-secondary">MOVIMENTAÇÕES</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/entrada" class="nav-link text-white active"><i class="bi bi-plus-circle"></i> Entrada</a></li>
            <li class="nav-item"><a href="/saida" class="nav-link text-white"><i class="bi bi-dash-circle"></i> Saída</a></li>
        </ul>

        <h6 class="text-secondary">CONSULTAS</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/estoque" class="nav-link text-white"><i class="bi bi-box-seam"></i> Estoque</a></li>
            <li class="nav-item"><a href="/pesquisar" class="nav-link text-white"><i class="bi bi-search"></i> Pesquisar</a></li>
            <li class="nav-item"><a href="/historico" class="nav-link text-white"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>

        <h6 class="text-secondary">CONTROLE</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/editar" class="nav-link text-white"><i class="bi bi-pencil-square"></i> Editar Produtos</a></li>
            <li class="nav-item"><a href="/validade" class="nav-link text-white"><i class="bi bi-exclamation-triangle"></i> Validades</a></li>
         <!-- VOLTAR PARA DASHBOARD -->
            <li class="nav-item mt-3">
                <a href="/" class="nav-link text-white"><i class="bi bi-house"></i> Dashboard</a>
            </li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="content p-4" style="flex: 1;">
        <h2 class="mb-4">Entrada de Produto</h2>

        <div class="card p-4 shadow-sm">

            <!-- AUTO COMPLETE PRODUTO -->
            <div class="mb-3 position-relative">
                <label class="form-label">Produto</label>
                <input type="text" id="produto" class="form-control" placeholder="Digite para buscar..." oninput="autoProduto()" autocomplete="off">
                <ul id="listaProd" class="list-group autocomplete-list"></ul>
            </div>

            <div class="mb-3">
                <label class="form-label">Lote</label>
                <input type="text" id="lote" class="form-control" placeholder="Ex: 12345">
            </div>

            <div class="mb-3">
                <label class="form-label">Validade</label>
                <input type="date" id="validade" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Quantidade</label>
                <input type="number" id="quantidade" class="form-control" placeholder="Ex: 50">
            </div>

            <button class="btn btn-success w-100" onclick="registrarEntrada()">
                <i class="bi bi-check-circle"></i> Registrar Entrada
            </button>

            <p id="mensagem" class="mt-3"></p>
        </div>
    </div>

</div>

<!-- Bootstrap + JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ===========================
// AUTO COMPLETE PRODUTO
// ===========================
function autoProduto() {
    let termo = document.getElementById("produto").value.trim();

    if (termo.length < 2) {
        document.getElementById("listaProd").innerHTML = "";
        return;
    }

    fetch(`/api/autocomplete_produtos/${termo}`)
        .then(r => r.json())
        .then(lista => {
            let box = document.getElementById("listaProd");
            box.innerHTML = "";

            lista.forEach(prod => {
                box.innerHTML += `
                    <li class="list-group-item list-group-item-action"
                        onclick="selecionarProduto('${prod}')">
                        ${prod}
                    </li>`;
            });
        });
}

function selecionarProduto(nome) {
    document.getElementById("produto").value = nome;
    document.getElementById("listaProd").innerHTML = "";
}


// ===========================
// REGISTRAR ENTRADA
// ===========================
function registrarEntrada() {

    const dados = {
        produto: document.getElementById("produto").value,
        lote: document.getElementById("lote").value,
        validade: document.getElementById("validade").value,
        quantidade: document.getElementById("quantidade").value
    };

    if (!dados.produto || !dados.lote || !dados.validade || !dados.quantidade) {
        document.getElementById("mensagem").innerHTML = "<span class='text-danger'>Preencha todos os campos.</span>";
        return;
    }

    fetch("/api/entrada", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(dados)
    })
    .then(res => res.json())
    .then(resp => {
        document.getElementById("mensagem").innerHTML =
            "<span class='text-success'>Entrada registrada com sucesso!</span>";

        document.getElementById("produto").value = "";
        document.getElementById("lote").value = "";
        document.getElementById("validade").value = "";
        document.getElementById("quantidade").value = "";
    });
}

</script>

</body>
</html>
