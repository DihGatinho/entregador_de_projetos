<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota de Saída - Beep Saúde</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f2f2f2;
        }

        .nota-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 850px;
            margin: auto;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        .linha-assinatura {
            margin-top: 50px;
            border-top: 1px solid #000;
            width: 300px;
        }

        @media print {
            .btn {
                display: none !important;
            }
            body {
                background: white;
            }
            .nota-container {
                margin: 0;
                box-shadow: none;
                padding-top: 0;
            }
        }
    </style>
</head>

<body class="p-4">

<div class="nota-container">

    <!-- CABEÇALHO -->
    <div class="text-center">
        <img src="/static/img/beep_logo.png" alt="Beep" style="max-width: 120px; margin-bottom: 10px;">
        <h3 class="fw-bold">Beep Saúde</h3>
        <h5 class="text-secondary">Nota de Saída de Estoque</h5>
    </div>

    <hr>

    <!-- DADOS -->
    <p><b>Data da Saída:</b> <span id="dataNota"></span></p>

    <!-- ITENS -->
    <h5 class="mt-4">Itens Retirados:</h5>

    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr>
                <th>Produto</th>
                <th>Lote</th>
                <th>Validade</th>
                <th>Quantidade</th>
            </tr>
        </thead>
        <tbody id="listaItens"></tbody>

        <tfoot>
            <tr class="table-secondary">
                <th colspan="3" class="text-end">TOTAL</th>
                <th id="totalQtd">0</th>
            </tr>
        </tfoot>
    </table>

    <!-- RESPONSÁVEL -->
    <p class="mt-4"><b>Responsável:</b> WEB</p>

    <!-- ASSINATURA -->
    <div class="mt-5 text-center">
        <div class="linha-assinatura mx-auto"></div>
        <p class="text-muted">Assinatura do Responsável</p>
    </div>

    <!-- BOTÕES -->
    <button class="btn btn-primary w-100 mt-4" onclick="window.print()">
        <i class="bi bi-printer"></i> Imprimir Nota
    </button>

    <a href="/saida" class="btn btn-secondary w-100 mt-2">
        Voltar ao Sistema
    </a>

</div>

<script>
// Busca os dados da última nota gerada
fetch("/api/ultima_nota")
    .then(res => res.json())
    .then(nota => {

        // Proteção caso a resposta venha vazia
        if (!nota || !nota.itens || nota.itens.length === 0) {
            document.getElementById("listaItens").innerHTML = `
                <tr><td colspan="4" class="text-center text-danger">
                Nenhum item encontrado na nota.</td></tr>`;
            return;
        }

        document.getElementById("dataNota").innerText = nota.data;

        const tabela = document.getElementById("listaItens");
        let total = 0;

        nota.itens.forEach(item => {
            tabela.innerHTML += `
                <tr>
                    <td>${item.produto}</td>
                    <td>${item.lote}</td>
                    <td>${item.validade}</td>
                    <td>${item.quantidade}</td>
                </tr>
            `;
            total += Number(item.quantidade);
        });

        document.getElementById("totalQtd").innerText = total;
    })
    .catch(err => {
        document.getElementById("listaItens").innerHTML =
            `<tr><td colspan="4" class="text-center text-danger">Erro ao carregar a nota</td></tr>`;
        console.error("Erro:", err);
    });
</script>

</body>
</html>
