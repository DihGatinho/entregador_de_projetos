<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Produto - Beep Estoque</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .lote-vermelho { background: #ffcccc; }
        .lote-laranja { background: #ffe5cc; }
        .lote-amarelo { background: #fff7cc; }
        .lote-normal { background: #e7ffe7; }
        .autocomplete-list {
            position: absolute;
            z-index: 999;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>

</head>
<body>

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="sidebar bg-dark text-white p-3" style="width: 260px; min-height: 100vh;">
        <h4 class="text-center mb-4">Beep Estoque</h4>

        <h6 class="text-secondary">MOVIMENTAÇÕES</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/entrada" class="nav-link text-white"><i class="bi bi-plus-circle"></i> Entrada</a></li>
            <li class="nav-item"><a href="/saida" class="nav-link text-white"><i class="bi bi-dash-circle"></i> Saída</a></li>
        </ul>

        <h6 class="text-secondary">CONSULTAS</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/estoque" class="nav-link text-white"><i class="bi bi-box-seam"></i> Estoque</a></li>
            <li class="nav-item"><a href="/pesquisar" class="nav-link text-white active"><i class="bi bi-search"></i> Pesquisar</a></li>
            <li class="nav-item"><a href="/historico" class="nav-link text-white"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>

        <h6 class="text-secondary">CONTROLE</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/editar" class="nav-link text-white"><i class="bi bi-pencil-square"></i> Editar Produtos</a></li>
            <li class="nav-item"><a href="/validade" class="nav-link text-white"><i class="bi bi-exclamation-triangle"></i> Validades</a></li>
         <!-- VOLTAR PARA DASHBOARD -->
            <li class="nav-item mt-3">
                <a href="/" class="nav-link text-white"><i class="bi bi-house"></i> Dashboard</a>
            </li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="content p-4" style="flex: 1;">

        <h2 class="mb-3">Pesquisar Produto</h2>
        <p class="text-muted">Pesquise pelo nome do produto ou número do lote.</p>

        <!-- BUSCA + AUTO COMPLETE -->
        <div class="card p-3 shadow-sm mb-4 position-relative">
            <label class="form-label"><b>Buscar por:</b></label>
            <input
                type="text"
                id="campoBusca"
                class="form-control"
                placeholder="Digite para buscar..."
                oninput="autoCompletar()"
                autocomplete="off"
            >

            <!-- LISTA DE AUTO COMPLETE -->
            <ul id="listaSugestoes" class="list-group autocomplete-list"></ul>

            <button class="btn btn-primary mt-3" onclick="pesquisar()">
                <i class="bi bi-search"></i> Buscar
            </button>
        </div>

        <div id="totalItens" class="alert alert-info d-none"></div>

        <!-- RESULTADOS -->
        <table class="table table-bordered table-striped d-none" id="tabelaResultados">
            <thead class="table-dark">
                <tr>
                    <th>Produto</th>
                    <th>Lote</th>
                    <th>Validade</th>
                    <th>Dias</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>
</div>


<script>

// ==================================
// AUTO COMPLETE (PRODUTOS)
// ==================================
function autoCompletar() {
    const termo = document.getElementById("campoBusca").value.trim();

    if (termo.length < 2) {
        document.getElementById("listaSugestoes").innerHTML = "";
        return;
    }

    fetch(`/api/autocomplete_produtos/${termo}`)
        .then(res => res.json())
        .then(lista => {
            let box = document.getElementById("listaSugestoes");
            box.innerHTML = "";

            lista.forEach(nome => {
                box.innerHTML += `
                    <li class="list-group-item list-group-item-action"
                        onclick="selecionarProduto('${nome}')">
                        ${nome}
                    </li>`;
            });
        });
}

function selecionarProduto(nome) {
    document.getElementById("campoBusca").value = nome;
    document.getElementById("listaSugestoes").innerHTML = "";
    pesquisar();
}


// ==================================
// PESQUISAR PRODUTO / LOTE
// ==================================
function pesquisar() {
    const termo = document.getElementById("campoBusca").value.toLowerCase();
    if (!termo) return;

    fetch(`/api/pesquisar/${termo}`)
        .then(res => res.json())
        .then(dados => {

            const tabela = document.getElementById("tabelaResultados");
            const tbody = tabela.querySelector("tbody");
            const total = document.getElementById("totalItens");

            tbody.innerHTML = "";
            tabela.classList.add("d-none");
            total.classList.add("d-none");

            if (dados.length === 0) {
                total.classList.remove("d-none");
                total.innerHTML = "<b>Nenhum resultado encontrado.</b>";
                return;
            }

            let soma = 0;

            dados.forEach(item => {
                soma += Number(item.Quantidade);

                let validade = new Date(item.Validade);
                let hoje = new Date();
                let dias = Math.floor((validade - hoje) / (1000 * 60 * 60 * 24));

                let classe = "lote-normal";
                if (dias < 10) classe = "lote-vermelho";
                else if (dias < 20) classe = "lote-laranja";
                else if (dias < 45) classe = "lote-amarelo";

                tbody.innerHTML += `
                    <tr class="${classe}">
                        <td>${item.Produto}</td>
                        <td>${item.Lote}</td>
                        <td>${item.Validade}</td>
                        <td>${dias}</td>
                        <td>${item.Quantidade}</td>
                    </tr>
                `;
            });

            total.classList.remove("d-none");
            total.innerHTML = `<b>Total encontrado:</b> ${soma} unidades`;

            tabela.classList.remove("d-none");
        });
}
</script>

</body>
</html>
