<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto - Beep Estoque</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Estilo das sugestões */
        #sugestoes {
            position: absolute;
            background: white;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }

        #sugestoes div {
            padding: 8px;
            cursor: pointer;
        }

        #sugestoes div:hover {
            background: #e8f5e9;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="sidebar bg-dark text-white p-3" style="width: 260px; min-height: 100vh;">
        <h4 class="text-center mb-4">Beep Estoque</h4>

        <h6 class="text-secondary">MOVIMENTAÇÕES</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/entrada" class="nav-link text-white"><i class="bi bi-plus-circle"></i> Entrada</a></li>
            <li class="nav-item"><a href="/saida" class="nav-link text-white"><i class="bi bi-dash-circle"></i> Saída</a></li>
        </ul>

        <h6 class="text-secondary">CONSULTAS</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/estoque" class="nav-link text-white"><i class="bi bi-box-seam"></i> Estoque</a></li>
            <li class="nav-item"><a href="/pesquisar" class="nav-link text-white"><i class="bi bi-search"></i> Pesquisar</a></li>
            <li class="nav-item"><a href="/historico" class="nav-link text-white"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>

        <h6 class="text-secondary">CONTROLE</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/editar" class="nav-link text-white active"><i class="bi bi-pencil-square"></i> Editar Produtos</a></li>
            <li class="nav-item"><a href="/validade" class="nav-link text-white"><i class="bi bi-exclamation-triangle"></i> Validades</a></li>
         <!-- VOLTAR PARA DASHBOARD -->
            <li class="nav-item mt-3">
                <a href="/" class="nav-link text-white"><i class="bi bi-house"></i> Dashboard</a>
            </li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="content p-4" style="flex: 1;">

        <h2 class="mb-4">Editar Produto</h2>

        <!-- BUSCA -->
        <div class="card p-3 shadow-sm mb-4 position-relative">
            <label class="form-label">Buscar nome do produto</label>
            <input type="text" id="campoBusca" class="form-control" placeholder="Digite para buscar..." oninput="autocomplete()">

            <!-- Sugestões -->
            <div id="sugestoes" class="d-none"></div>

            <button class="btn btn-primary mt-3" onclick="buscar()">
                <i class="bi bi-search"></i> Buscar
            </button>
        </div>

        <!-- TABELA COM LOTES PARA EDITAR -->
        <table class="table table-bordered table-striped d-none" id="tabelaLotes">
            <thead class="table-dark">
                <tr>
                    <th>Selecionar</th>
                    <th>Produto</th>
                    <th>Lote</th>
                    <th>Validade</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- FORMULÁRIO DE EDIÇÃO -->
        <div id="formEditar" class="card p-3 shadow-sm mt-4 d-none">

            <label class="form-label">Campo a editar</label>
            <select id="campoEditar" class="form-control mb-3">
                <option value="produto">Produto</option>
                <option value="lote">Lote</option>
                <option value="validade">Validade</option>
                <option value="quantidade">Quantidade</option>
            </select>

            <label class="form-label">Novo valor</label>
            <input type="text" id="novoValor" class="form-control mb-3">

            <button class="btn btn-success w-100" onclick="enviarEdicao()">
                <i class="bi bi-check-circle"></i> Atualizar Produto
            </button>

            <p id="msg" class="mt-3"></p>
        </div>

    </div>
</div>

<script>
let produtoSelecionado = null;

/* ==========================
   AUTO-COMPLETE PROFISSIONAL
========================== */
function autocomplete() {
    const termo = document.getElementById("campoBusca").value.toLowerCase();
    const divSugestoes = document.getElementById("sugestoes");

    if (termo.length < 2) {
        divSugestoes.classList.add("d-none");
        return;
    }

    fetch(`/api/autocomplete/${termo}`)
        .then(res => res.json())
        .then(lista => {
            divSugestoes.innerHTML = "";

            if (lista.length === 0) {
                divSugestoes.classList.add("d-none");
                return;
            }

            lista.forEach(prod => {
                const item = document.createElement("div");
                item.textContent = prod;
                item.onclick = function () {
                    document.getElementById("campoBusca").value = prod;
                    divSugestoes.classList.add("d-none");
                };
                divSugestoes.appendChild(item);
            });

            divSugestoes.classList.remove("d-none");
        });
}

/* ==========================
   BUSCAR PRODUTO
========================== */
function buscar() {
    const termo = document.getElementById("campoBusca").value.toLowerCase();
    if (!termo) return;

    fetch(`/api/pesquisar/${termo}`)
        .then(res => res.json())
        .then(dados => {
            const tabela = document.getElementById("tabelaLotes");
            const tbody = tabela.querySelector("tbody");
            tbody.innerHTML = "";

            if (dados.length === 0) {
                alert("Nenhum produto encontrado.");
                return;
            }

            dados.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td><input type="radio" name="escolha" onclick="selecionar('${item.Produto}')"></td>
                        <td>${item.Produto}</td>
                        <td>${item.Lote}</td>
                        <td>${item.Validade}</td>
                        <td>${item.Quantidade}</td>
                    </tr>
                `;
            });

            tabela.classList.remove("d-none");
        });
}

/* ==========================
   SELECIONAR PRODUTO
========================== */
function selecionar(produto) {
    produtoSelecionado = produto;
    document.getElementById("formEditar").classList.remove("d-none");
}

/* ==========================
   ENVIAR ALTERAÇÃO
========================== */
function enviarEdicao() {
    const campo = document.getElementById("campoEditar").value;
    const valor = document.getElementById("novoValor").value;

    if (!valor) {
        alert("Digite o novo valor.");
        return;
    }

    fetch("/api/editar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            produto: produtoSelecionado,
            campo: campo,
            valor: valor
        })
    })
    .then(res => res.json())
    .then(resp => {
        if (resp.status === "ok") {
            document.getElementById("msg").innerHTML =
                "<span class='text-success'>Atualizado com sucesso!</span>";
        } else {
            document.getElementById("msg").innerHTML =
                "<span class='text-danger'>Erro: " + resp.erro + "</span>";
        }
    });
}
</script>

</body>
</html>
