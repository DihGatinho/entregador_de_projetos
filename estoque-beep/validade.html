<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validades - Beep Estoque</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .danger { background: #ffcccc !important; }
        .warning { background: #ffe5cc !important; }
        .alerta { background: #fff7cc !important; }
        .normal { background: #e7ffe7 !important; }
    </style>
</head>
<body>

<div class="d-flex">

    <!-- MENU LATERAL -->
    <div class="sidebar bg-dark text-white p-3" style="width: 260px; min-height: 100vh;">
        <h4 class="text-center mb-4">Beep Estoque</h4>

        <h6 class="text-secondary">MOVIMENTAÇÕES</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/entrada" class="nav-link text-white"><i class="bi bi-plus-circle"></i> Entrada</a></li>
            <li class="nav-item"><a href="/saida" class="nav-link text-white"><i class="bi bi-dash-circle"></i> Saída</a></li>
        </ul>

        <h6 class="text-secondary">CONSULTAS</h6>
        <ul class="nav flex-column mb-3">
            <li class="nav-item"><a href="/estoque" class="nav-link text-white"><i class="bi bi-box-seam"></i> Estoque</a></li>
            <li class="nav-item"><a href="/pesquisar" class="nav-link text-white"><i class="bi bi-search"></i> Pesquisar</a></li>
            <li class="nav-item"><a href="/historico" class="nav-link text-white"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>

        <h6 class="text-secondary">CONTROLE</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/editar" class="nav-link text-white"><i class="bi bi-pencil-square"></i> Editar Produtos</a></li>
            <li class="nav-item"><a href="/validade" class="nav-link text-white active"><i class="bi bi-exclamation-triangle"></i> Validades</a></li>
         <!-- VOLTAR PARA DASHBOARD -->
            <li class="nav-item mt-3">
                <a href="/" class="nav-link text-white"><i class="bi bi-house"></i> Dashboard</a>
            </li>
        </ul>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="content p-4" style="flex: 1;">

        <h2 class="mb-3">Produtos Próximos do Vencimento</h2>
        <p class="text-muted">Listando todos os itens que vencem em até <b>45 dias</b>.</p>

        <div id="resumo" class="alert alert-info d-none"></div>

        <table class="table table-bordered table-striped mt-3" id="tabelaValidade">
            <thead class="table-dark">
                <tr>
                    <th>Produto</th>
                    <th>Lote</th>
                    <th>Validade</th>
                    <th>Dias Restantes</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

</div>

<script>
function carregar() {
    fetch("/api/validade")
        .then(res => res.json())
        .then(lista => {

            const tbody = document.querySelector("#tabelaValidade tbody");
            const resumo = document.getElementById("resumo");

            tbody.innerHTML = "";

            if (lista.length === 0) {
                resumo.classList.remove("d-none");
                resumo.innerHTML = "Nenhum produto vencendo em até 45 dias.";
                return;
            }

            resumo.classList.remove("d-none");
            resumo.innerHTML = `<b>Total de itens prestes a vencer:</b> ${lista.length}`;

            lista.forEach(item => {
                let dias = item.DiasRestantes;

                let classe = "normal";
                if (dias < 10) classe = "danger";
                else if (dias < 20) classe = "warning";
                else if (dias < 45) classe = "alerta";

                tbody.innerHTML += `
                    <tr class="${classe}">
                        <td>${item.Produto}</td>
                        <td>${item.Lote}</td>
                        <td>${item.Validade}</td>
                        <td>${dias}</td>
                        <td>${item.Quantidade}</td>
                    </tr>
                `;
            });

        });
}

// carregar ao abrir
carregar();
</script>

</body>
</html>
